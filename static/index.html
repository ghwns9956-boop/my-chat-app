<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Real-time Chat</title>
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 닉네임 설정 화면 -->
        <div id="login-screen" class="screen active">
            <div class="glass-card">
                <h2>환영합니다 👋</h2>
                <p style="margin-bottom: 1rem; color: var(--text-muted);">채팅방에 입장하려면 닉네임을 입력하세요.</p>
                
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <input type="text" id="username-input" placeholder="닉네임 입력..." required autocomplete="off">
                    <button type="button" id="random-name-btn" title="랜덤 닉네임" style="width: auto; padding: 0 1rem; flex-shrink: 0;">🎲</button>
                </div>

                <div class="lobby-tabs" style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                    <button type="button" id="tab-join" class="lobby-tab active" style="flex: 1; border-radius: var(--radius); padding: 0.5rem; background: rgba(255,255,255,0.1); border: 1px solid var(--border);">방 참가</button>
                    <button type="button" id="tab-create" class="lobby-tab" style="flex: 1; border-radius: var(--radius); padding: 0.5rem; background: transparent; border: 1px solid transparent; color: var(--text-muted);">방 만들기</button>
                </div>

                <!-- 방 참가 폼 -->
                <form id="join-form">
                    <input type="text" id="invite-code-input" placeholder="초대 코드 (예: A1B2)" style="margin-bottom: 1rem;" autocomplete="off" required>
                    <button type="submit">채팅방 입장하기</button>
                </form>

                <!-- 방 생성 폼 -->
                <form id="create-form" class="hidden">
                    <input type="password" id="manager-code-input" placeholder="관리자 비밀번호 (방 생성 권한)" style="margin-bottom: 1rem;" autocomplete="off" required>
                    <input type="text" id="new-room-name-input" placeholder="생성할 채팅방 이름" style="margin-bottom: 1rem;" autocomplete="off" required>
                    <button type="submit">새 방 만들기</button>
                </form>
            </div>
        </div>

        <!-- 채팅 화면 (사이드바 포함) -->
        <div id="chat-screen" class="screen chat-layout">
            <!-- 메인 채팅 영역 -->
            <div class="chat-main-area">
                <div id="drag-overlay" class="drag-overlay hidden">
                    <div class="drag-message">📸 여기에 사진을 놓아 전송하세요!</div>
                </div>
            
            <header class="chat-header">
                <div class="header-info">
                    <h2 id="room-name-display">글로벌 채팅방</h2>
                    <span id="user-count-display" class="user-count">온라인: 1명</span>
                </div>
                <div class="header-actions">
                    <button type="button" id="manage-room-btn" class="icon-btn hidden" title="방 관리">👑</button>
                    <button type="button" id="clear-chat-btn" class="icon-btn danger-btn" title="내 화면의 모든 대화 기록 싹 지우기">🗑️</button>
                    <button type="button" id="rename-btn" class="icon-btn" title="내 닉네임 변경">👤</button>
                    <button type="button" id="logout-btn" class="logout-btn" title="로비로 가기">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                    <button type="button" id="toggle-sidebar-btn" class="mobile-sidebar-toggle" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-left: 0.3rem;">채팅방 리스트</button>
                </div>
            </header>
            
            <div id="chat-messages" class="chat-messages">
                <!-- 메시지들이 여기에 추가됩니다 -->
                <div class="system-message">환영합니다! 채팅을 시작해보세요.</div>
            </div>
            
            <div id="typing-indicator" class="typing-indicator hidden">
                <span id="typing-text"></span>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>

            <div class="chat-input-area">
                <div id="replying-to-container" class="replying-to-container hidden">
                    <div class="reply-info">
                        <span class="reply-label">↪ 답장하기</span>
                        <span id="replying-to-name" class="reply-target-name"></span>
                        <span id="replying-to-text" class="reply-target-text"></span>
                    </div>
                    <button type="button" id="cancel-reply-btn" class="cancel-reply-btn" title="답장 취소">✕</button>
                </div>
                <form id="chat-form">
                    <button type="button" id="attach-btn" class="attach-btn" title="사진 첨부">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <button type="button" id="secret-btn" class="attach-btn" title="시크릿 메시지 (10초 폭파) 켜기/끄기">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </button>
                    <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
                    
                    <input type="text" id="message-input" placeholder="메시지 입력, 사진 붙여넣기(Ctrl+V), 드래그..." autocomplete="off" required>
                    <button type="submit" class="send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
            </div> <!-- 메인 채팅 영역 종료 -->
            
            <!-- 우측 사이드바 -->
            <aside id="room-sidebar" class="room-sidebar">
                <div class="sidebar-header">
                    <h3 style="font-size: 1rem;">내 채팅방 리스트</h3>
                    <button id="close-sidebar-btn" class="icon-btn close-sidebar-btn">✕</button>
                </div>
                <div id="room-list-container" class="room-list-container">
                    <!-- 방 리스트 동적 렌더링 -->
                </div>
                <div class="sidebar-footer">
                    <button id="sidebar-add-room-btn" style="width: 100%; background: var(--secondary); padding: 0.6rem; border-radius: var(--radius);">+ 새 방 추가/참여</button>
                </div>
            </aside>
        </div>
    </div>

    <!-- 이미지 확대 보기 모달 -->
    <div id="image-zoom-modal" class="zoom-modal hidden">
        <button id="close-zoom-btn" class="close-zoom-btn">✕</button>
        <img id="zoomed-image" src="" alt="확대된 이미지">
    </div>

    <!-- 방 관리 모달 -->
    <div id="room-manage-modal" class="zoom-modal hidden" style="align-items: center; justify-content: center; background: rgba(0,0,0,0.8); display: flex;">
        <div class="glass-card" style="position: relative; z-index: 1000; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border);">
            <button id="close-manage-btn" class="close-zoom-btn" style="position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.5);">✕</button>
            <h2 style="margin-bottom: 1.5rem; color: var(--text-main);">👑 방 관리</h2>
            
            <div style="background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.1);">
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;">친구를 초대하려면 아래 코드를 공유하세요.</p>
                <div style="font-size: 3rem; font-weight: bold; letter-spacing: 5px; color: var(--primary); user-select: text;" id="manage-invite-code">ABCD</div>
                <button id="copy-code-btn" style="margin-top: 1rem; background: var(--secondary); display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%;">
                    <span>📋</span> 코드 복사하기
                </button>
            </div>
            
            <div style="text-align: left;">
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;">방 이름 변경</p>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="manage-room-name-input" placeholder="새 방 이름" style="flex: 1;">
                    <button id="manage-rename-btn" style="width: auto; white-space: nowrap; padding: 0 1rem;">변경</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 보스 키 가짜 화면 (Google Style) -->
    <div id="boss-key-overlay" class="hidden">
        <div class="fake-google-container">
            <h1 class="fake-google-logo">
                <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
            </h1>
            <div class="fake-search-box">
                <div class="fake-search-icon">🔍</div>
                <input type="text" class="fake-search-input" readonly>
                <div class="fake-mic-icon">🎤</div>
            </div>
            <div class="fake-buttons">
                <button>Google 검색</button>
                <button>I'm Feeling Lucky</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
